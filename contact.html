<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacTech Nigeria - Get in touch with us</title>
    <link rel="shortcut icon" href="logo.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="section-title">
            <h1>Contact Us</h1>
            <p>
                Hava a project in mind? Need a website, mobile app, landing page,
                or business automation solution? Let us discuss your ideas.
            </p>
        </div>
        <div class="contact-wrapper">
            <div class="contact-card">
             <h2>Get in Touch</h2>
             <div class="info-item">
                <div class="icon">📍</div>
                <div class="address">
                    <h3>Address</h3>
                    <p>Lagos Nigeria</p>
                </div>
             </div>
             <div class="info-item">
                <div class="icon">📞</div>
                <div class="address">
                    <h3>Phone</h3>
                    <p>08134324983</p>
                </div>
             </div>
             <div class="info-item">
                <div class="icon">✉️</div>
                <div class="address">
                    <h3>Email</h3>
                    <p>akinroyemo@gmail.com</p>
                </div>
             </div>
             <div class="info-item">
                <div class="icon">⏰</div>
                <div class="address">
                    <h3>Working Hours</h3>
                    <p>Mon - Sat: 8:00AM - 6:00 PM</p>
                </div>
             </div>
            </div>
            <div class="contact-card2">
                <h2>Send Us Message</h2>
                <form>
                    <input type="text" placeholder="Full Name" required>
                    <input type="email" placeholder="Email Address" required>
                    <input type="tel" placeholder="Phone Number" required>
                    <input type="text" placeholder="Subject" required>
                    <textarea placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
        <div class="map-section">
            <div class="map-container">

            </div>
        </div>
    </div>
</body>
</html>
